services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: prosms-backend

    restart: unless-stopped

    ports:
      - "8080:8080"

    env_file:
      - .env

    volumes:
      - ./logs:/app/logs
      - ./src/temp:/app/src/temp
      - ./src/uploads:/app/src/uploads

    networks:
      - prosms-network

    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # small but useful (prevents zombie processes)
    init: true

networks:
  prosms-network:
    external: true
